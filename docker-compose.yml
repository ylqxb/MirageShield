version: '3.8'
services:
  mirageshield:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirageshield
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
    environment:
      - FLASK_APP=start_server.py
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_RUN_PORT=8080
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - WATERMARK_KEY=${WATERMARK_KEY:-}
      - TOR_CONTROL_PASSWORD=${TOR_CONTROL_PASSWORD:-}
      - IP_REPUTATION_API_KEY=${IP_REPUTATION_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mirageshield-network

networks:
  mirageshield-network:
    driver: bridge