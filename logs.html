<!DOCTYPE html>
<html lang="zh-CN">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>系统日志 - MirageShield</title>
        <meta name="description" content="系统日志 - MirageShield 幻影盾主动防御系统">
        <link rel="preconnect" href="https://cdnjs.cloudflare.com">
        <link rel="preconnect" href="https://cdn.jsdelivr.net">
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #050a14, #0a192f, #172a45);
            color: #e6f1ff;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }
        
        /* 星光下坠效果 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .star {
            position: absolute;
            background: linear-gradient(45deg, #64ffda, #007bff);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.9), 0 0 30px rgba(0, 123, 255, 0.7), 0 0 45px rgba(100, 255, 218, 0.5);
            animation: fall linear infinite;
        }
        
        @keyframes fall {
            from {
                transform: translateY(-10px) translateX(0);
                opacity: 1;
            }
            to {
                transform: translateY(100vh) translateX(100px);
                opacity: 0;
            }
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: linear-gradient(135deg, #007bff, #64ffda);
            background-size: 400% 400%;
            color: #0a192f;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 6px 12px rgba(0, 123, 255, 0.3), 0 0 30px rgba(100, 255, 218, 0.2);
            animation: gradient 15s ease infinite;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(100, 255, 218, 0.3);
        }
        
        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                rgba(100, 255, 218, 0.1) 2px,
                transparent 4px
            );
            animation: techScan 4s linear infinite;
            z-index: 0;
        }
        
        @keyframes techScan {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }
        
        header h1, header p {
            position: relative;
            z-index: 1;
        }
        
        header h1 {
            font-size: 32px;
            margin-bottom: 15px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(100, 255, 218, 0.5);
        }
        
        header p {
            font-size: 18px;
            opacity: 0.9;
            text-shadow: 0 0 5px rgba(100, 255, 218, 0.3);
        }
        
        .status-section {
            background: rgba(23, 42, 69, 0.6);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(100, 255, 218, 0.15);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .status-section:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            border-color: rgba(100, 255, 218, 0.3);
        }
        
        .section-title {
            font-size: 22px;
            margin-bottom: 25px;
            color: #64ffda;
            border-bottom: 3px solid #007bff;
            padding-bottom: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
        }
        
        .section-title::before {
            content: '';
            width: 8px;
            height: 24px;
            background-color: #007bff;
            margin-right: 12px;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.8);
        }
        
        .status-card {
            background: rgba(10, 25, 47, 0.8);
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid rgba(100, 255, 218, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .status-card:hover {
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3), 0 0 20px rgba(100, 255, 218, 0.1);
            transform: translateX(5px);
            border-color: rgba(100, 255, 218, 0.5);
        }
        
        .status-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #64ffda, transparent);
            animation: lineScan 2s ease-in-out infinite;
        }
        
        @keyframes lineScan {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }
        
        .status-card.warning {
            background: rgba(243, 156, 18, 0.1);
            border: 1px solid rgba(243, 156, 18, 0.3);
        }
        
        .status-card.warning::before {
            background: linear-gradient(90deg, transparent, #f39c12, transparent);
        }
        
        .status-card.danger {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
        }
        
        .status-card.danger::before {
            background: linear-gradient(90deg, transparent, #e74c3c, transparent);
        }
        
        .status-card.success {
            background: rgba(39, 174, 96, 0.1);
            border: 1px solid rgba(39, 174, 96, 0.3);
        }
        
        .status-card.success::before {
            background: linear-gradient(90deg, transparent, #27ae60, transparent);
        }
        
        .card-title {
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 18px;
            color: #64ffda;
        }
        
        .card-content {
            font-size: 15px;
            color: #a8b2d1;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            margin-right: 12px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            font-weight: 600;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #007bff, #64ffda);
            color: #0a192f;
            box-shadow: 0 4px 8px rgba(0, 123, 255, 0.3), 0 0 15px rgba(100, 255, 218, 0.2);
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.4s ease;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 123, 255, 0.5), 0 0 20px rgba(100, 255, 218, 0.3);
            background: linear-gradient(135deg, #64ffda, #007bff);
        }
        
        .btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 4px rgba(0, 123, 255, 0.3);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #9b59b6, #ba68c8);
            color: #0a192f;
            box-shadow: 0 4px 8px rgba(155, 89, 182, 0.3), 0 0 15px rgba(186, 104, 200, 0.2);
        }
        
        .btn-secondary:hover {
            box-shadow: 0 6px 12px rgba(155, 89, 182, 0.5), 0 0 20px rgba(186, 104, 200, 0.3);
            background: linear-gradient(135deg, #ba68c8, #9b59b6);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #a8b2d1;
            font-style: italic;
            background: rgba(10, 25, 47, 0.7);
            border: 1px solid rgba(100, 255, 218, 0.2);
            border-radius: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0% {
                opacity: 0.6;
                box-shadow: 0 0 10px rgba(100, 255, 218, 0.3);
            }
            50% {
                opacity: 1;
                box-shadow: 0 0 20px rgba(100, 255, 218, 0.6);
            }
            100% {
                opacity: 0.6;
                box-shadow: 0 0 10px rgba(100, 255, 218, 0.3);
            }
        }
        
        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px;
            background: linear-gradient(135deg, #007bff, #64ffda);
            background-size: 400% 400%;
            color: #0a192f;
            border-radius: 12px;
            box-shadow: 0 -4px 8px rgba(0,0,0,0.3), 0 0 30px rgba(100, 255, 218, 0.2);
            animation: gradient 15s ease infinite;
            position: relative;
            overflow: hidden;
        }
        
        .footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                rgba(100, 255, 218, 0.1) 2px,
                transparent 4px
            );
            animation: techScan 4s linear infinite;
            z-index: 0;
        }
        
        .footer p {
            position: relative;
            z-index: 1;
            margin: 0;
            opacity: 0.9;
            font-size: 16px;
        }
        
        .controls {
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            header {
                padding: 30px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            .btn {
                display: block;
                width: 100%;
                margin-right: 0;
                margin-bottom: 12px;
                text-align: center;
            }
            
            .status-section {
                padding: 20px;
            }
        }
        
        /* 返回置顶按钮 */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #007bff, #64ffda);
            color: #0a192f;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(100, 255, 218, 0.4);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 1000;
            font-size: 24px;
            font-weight: bold;
        }
        
        .back-to-top.visible {
            opacity: 1;
        }
        
        .back-to-top:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(100, 255, 218, 0.6);
        }
        </style>
    <script src="i18n.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <header>
            <h1 id="page-title">系统日志 - MirageShield</h1>
            <p id="page-subtitle">实时系统日志查看与管理</p>
        </header>
        
        <div class="controls">
            <button class="btn btn-secondary" onclick="window.location.href='/ui/index.html'" id="back-button">返回主页面</button>
            <button class="btn" onclick="refreshLogs()" id="refresh-button">刷新日志</button>
            <select id="log-level" onchange="filterLogs()" style="padding: 12px 16px; border-radius: 6px; border: 1px solid rgba(100, 255, 218, 0.3); font-size: 15px; background: rgba(10, 25, 47, 0.9); color: #e6f1ff; margin-right: 12px;">
                <option value="all" id="option-all">所有级别</option>
                <option value="ERROR" id="option-error">错误</option>
                <option value="WARNING" id="option-warning">警告</option>
                <option value="INFO" id="option-info">信息</option>
            </select>
            <input type="text" id="log-search" placeholder="搜索日志..." onkeyup="filterLogs()" style="padding: 12px 16px; border-radius: 6px; border: 1px solid rgba(100, 255, 218, 0.3); font-size: 15px; background: rgba(10, 25, 47, 0.9); color: #e6f1ff; margin-right: 12px;">
        </div>
        
        <div class="status-section">
            <h2 class="section-title">系统日志</h2>
            <div id="logs-content" class="loading">
                加载中...
            </div>
            <div id="log-stats" style="margin-top: 20px; padding: 15px; background: rgba(10, 25, 47, 0.7); border-radius: 8px; border: 1px solid rgba(100, 255, 218, 0.2);">
                <p style="margin: 0; color: #a8b2d1;" id="log-stats-text">显示 <span id="log-count">0</span> 条日志，共 <span id="total-log-count">0</span> 条</p>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 MirageShield 团队 版权所有，侵权必究 - 版本 1.0.0</p>
        </div>
    </div>
    
    <!-- 返回置顶按钮 -->
    <div class="back-to-top" id="backToTop">↑</div>
    
    <script>
        // 确保API_BASE只被声明一次
        if (typeof API_BASE === 'undefined') {
            var API_BASE = 'http://localhost:8080';
        }
        
        // 认证相关变量
        let token = localStorage.getItem('token');
        let user = JSON.parse(localStorage.getItem('user') || 'null');
        let allLogs = []; // 存储所有日志数据
        
        // 初始化返回置顶按钮
        function initBackToTop() {
            const backToTopButton = document.getElementById('backToTop');
            
            // 监听滚动事件
            window.addEventListener('scroll', function() {
                if (window.pageYOffset > 300) {
                    backToTopButton.classList.add('visible');
                } else {
                    backToTopButton.classList.remove('visible');
                }
            });
            
            // 点击事件
            backToTopButton.addEventListener('click', function() {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
        }
        
        // 检查是否在 GitHub Pages 上运行
        const isGitHubPages = window.location.hostname === 'ylqxb.github.io';
        
        // 页面加载时获取状态
        window.onload = function() {
            // 初始化语言
            initLanguage();
            // 检查认证状态
            checkAuthStatus();
            // 加载日志
            if (isGitHubPages) {
                // 在 GitHub Pages 上使用模拟数据
                loadMockLogs();
            } else {
                // 在本地环境使用真实 API
                getLogs();
            }
            // 初始化返回置顶按钮
            initBackToTop();
        };
        
        // 加载模拟日志数据
        function loadMockLogs() {
            // 生成模拟日志数据
            allLogs = [
                { level: 'INFO', timestamp: new Date().toLocaleString(), module: 'system', message: '系统启动成功' },
                { level: 'INFO', timestamp: new Date(new Date().getTime() - 60000).toLocaleString(), module: 'agent', message: '智能体初始化完成' },
                { level: 'WARNING', timestamp: new Date(new Date().getTime() - 120000).toLocaleString(), module: 'network', message: '网络连接不稳定' },
                { level: 'INFO', timestamp: new Date(new Date().getTime() - 180000).toLocaleString(), module: 'hardware', message: '硬件设备检测完成' },
                { level: 'ERROR', timestamp: new Date(new Date().getTime() - 240000).toLocaleString(), module: 'api', message: 'API 请求失败' },
                { level: 'INFO', timestamp: new Date(new Date().getTime() - 300000).toLocaleString(), module: 'defense', message: '防御策略更新成功' },
                { level: 'WARNING', timestamp: new Date(new Date().getTime() - 360000).toLocaleString(), module: 'agent', message: '智能体响应超时' },
                { level: 'INFO', timestamp: new Date(new Date().getTime() - 420000).toLocaleString(), module: 'system', message: '系统状态正常' },
                { level: 'INFO', timestamp: new Date(new Date().getTime() - 480000).toLocaleString(), module: 'network', message: '网络连接恢复正常' },
                { level: 'INFO', timestamp: new Date(new Date().getTime() - 540000).toLocaleString(), module: 'defense', message: '成功拦截攻击' }
            ];
            
            // 过滤并显示日志
            filterLogs();
            // 更新统计信息
            document.getElementById('total-log-count').textContent = allLogs.length;
        }
        
        // 检查认证状态
        function checkAuthStatus() {
            if (!token || !user) {
                // 如果未登录，重定向到登录页面
                window.location.href = '/ui/index.html';
            }
        }
        
        // 添加请求拦截器，为需要认证的请求添加token
        function authenticatedFetch(url, options = {}) {
            if (token) {
                options.headers = options.headers || {};
                options.headers['Authorization'] = `Bearer ${token}`;
            }
            return fetch(url, options);
        }
        
        // 获取系统日志
        function getLogs() {
            return authenticatedFetch(`${API_BASE}/api/logs?limit=100`)
                .then(response => response.json())
                .then(data => {
                    if (data.logs && data.logs.length > 0) {
                        allLogs = data.logs;
                        filterLogs();
                        // 更新统计信息
                        const totalLogCount = document.getElementById('total-log-count');
                        if (totalLogCount) {
                            totalLogCount.textContent = allLogs.length;
                        }
                    } else {
                        allLogs = [];
                        const logsDiv = document.getElementById('logs-content');
                        if (logsDiv) {
                            logsDiv.innerHTML = `<div class="status-card"><div class="card-title">${t('logs.no_records')}</div><div class="card-content">${t('logs.no_logs_generated')}</div></div>`;
                        }
                        const logCount = document.getElementById('log-count');
                        if (logCount) {
                            logCount.textContent = '0';
                        }
                        const totalLogCount = document.getElementById('total-log-count');
                        if (totalLogCount) {
                            totalLogCount.textContent = '0';
                        }
                    }
                })
                .catch(error => {
                    const logsDiv = document.getElementById('logs-content');
                    if (logsDiv) {
                        logsDiv.innerHTML = `<div class="status-card danger"><div class="card-title">${t('logs.loading_failed')}</div><div class="card-content">${t('logs.failed_to_get_logs')}: ${error.message}</div></div>`;
                    }
                });
        }
        
        // 过滤日志
        function filterLogs() {
            const levelFilterElement = document.getElementById('log-level');
            const searchTermElement = document.getElementById('log-search');
            
            if (!levelFilterElement || !searchTermElement) {
                return;
            }
            
            const levelFilter = levelFilterElement.value;
            const searchTerm = searchTermElement.value.toLowerCase();
            
            let filteredLogs = allLogs;
            
            // 按级别过滤
            if (levelFilter !== 'all') {
                filteredLogs = filteredLogs.filter(log => log.level === levelFilter);
            }
            
            // 按搜索词过滤
            if (searchTerm) {
                filteredLogs = filteredLogs.filter(log => 
                    log.module.toLowerCase().includes(searchTerm) || 
                    log.message.toLowerCase().includes(searchTerm) ||
                    log.timestamp.toLowerCase().includes(searchTerm)
                );
            }
            
            // 显示过滤后的日志
            const logsDiv = document.getElementById('logs-content');
            if (logsDiv) {
                if (filteredLogs.length > 0) {
                    let html = '';
                    filteredLogs.forEach(log => {
                        const levelClass = {
                            'ERROR': 'danger',
                            'WARNING': 'warning',
                            'INFO': 'success'
                        }[log.level] || '';
                        html += `
                            <div class="status-card ${levelClass}">
                                <div class="card-title">${log.level} - ${log.timestamp}</div>
                                <div class="card-content">
                                    <strong>${log.module}</strong>: ${log.message}
                                </div>
                            </div>
                        `;
                    });
                    logsDiv.innerHTML = html;
                    const logCount = document.getElementById('log-count');
                    if (logCount) {
                        logCount.textContent = filteredLogs.length;
                    }
                } else {
                    logsDiv.innerHTML = `<div class="status-card"><div class="card-title">${t('logs.no_records')}</div><div class="card-content">${t('logs.no_matching_logs')}</div></div>`;
                    const logCount = document.getElementById('log-count');
                    if (logCount) {
                        logCount.textContent = '0';
                    }
                }
            }
        }
        
        // 刷新日志
        function refreshLogs() {
            getLogs();
        }
        
        // 生成星光效果
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 100;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // 随机大小
                const size = Math.random() * 3 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                
                // 随机位置
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                
                // 随机动画持续时间
                const duration = Math.random() * 10 + 10;
                star.style.animationDuration = `${duration}s`;
                
                // 随机延迟
                const delay = Math.random() * 10;
                star.style.animationDelay = `${delay}s`;
                
                starsContainer.appendChild(star);
            }
        }
        
        // 创建星光效果
        createStars();
    </script>
</body>
</html>
